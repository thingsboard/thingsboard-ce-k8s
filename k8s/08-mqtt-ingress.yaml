apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thingsboard-mqtt-ingress
  namespace: thingsboard
  annotations:
    # Configure based on your ingress controller
    # Example for HAProxy:
    # haproxy.org/ssl-certificate: your-domain.com
    # haproxy.org/ssl-redirect: "true"
spec:
  ingressClassName: nginx  # Change to your ingress class (nginx, haproxy, etc.)
  rules:
  - host: mqtt.example.com  # Change to your MQTT domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tb-mqtt-transport
            port:
              number: 1883
  tls:
  - hosts:
    - mqtt.example.com  # Change to your MQTT domain
    secretName: thingsboard-mqtt-tls  # Create this secret with your TLS certificate
